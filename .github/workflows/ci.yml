name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.json
        run: jq empty plugins/homelab-copilot/plugin.json .github/plugin/marketplace.json
      - name: Validate agent frontmatter
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::error file=$f::missing YAML frontmatter opening ---"
              fail=1
            fi
          done < <(find plugins/homelab-copilot/agents -name '*.agent.md' -type f)
          exit $fail

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
